services:
  iperf-client:
    container_name: iperf-client
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - iperf-server
      - router
    cap_add:
      - NET_ADMIN
    networks:
      iperf-client-net:
        ipv4_address: 172.20.1.10
  
  router:
    container_name: router
    build:
      context: .
      dockerfile: Dockerfile.router
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      iperf-client-net:
        ipv4_address: 172.20.1.11
      iperf-server-net:
        ipv4_address: 172.20.2.11

  iperf-server:
    container_name: iperf-server
    build:
      context: .
      dockerfile: Dockerfile.server
    cap_add:
      - NET_ADMIN
    networks:
      iperf-server-net:
        ipv4_address: 172.20.2.10

networks:
  iperf-client-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
          gateway: 172.20.1.1
  iperf-server-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24
          gateway: 172.20.2.1
